name: Test AKS Kured POC

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment name'
        required: false
        default: 'poc'
        type: string
      test_duration:
        description: 'Duration of availability test in seconds'
        required: false
        default: '300'
        type: string
      simulate_reboot:
        description: 'Trigger simulated node reboot during test'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      kured_start_time:
        description: 'Kured reboot window start time (e.g. 0am for demo, 2am for default)'
        required: false
        default: '0am'
        type: string
      kured_end_time:
        description: 'Kured reboot window end time (e.g. 11:59pm for demo, 6am for default)'
        required: false
        default: '11:59pm'
        type: string
      kured_reboot_days:
        description: 'Kured reboot days (comma-separated, e.g. mo,tu,we,th,fr,sa,su)'
        required: false
        default: 'mo,tu,we,th,fr,sa,su'
        type: string

permissions:
  id-token: write
  contents: write

env:
  RESOURCE_GROUP: rg-aks-kured-${{ github.event.inputs.environment || 'poc' }}
  CLUSTER_NAME: aks-kured-${{ github.event.inputs.environment || 'poc' }}

jobs:
  setup-test:
    name: Setup Test Environment
    runs-on: ubuntu-latest
    outputs:
      service-ip: ${{ steps.get-ip.outputs.ip }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Get Service IP
        id: get-ip
        run: |
          IP=$(kubectl get svc zero-downtime-web --namespace demo \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ -z "$IP" ]; then
            echo "::error::No LoadBalancer IP found for zero-downtime-web service"
            exit 1
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "Service IP: $IP"

      - name: Pre-Test Cluster State
        run: |
          echo "=== Node Status ==="
          kubectl get nodes -o wide
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods --namespace demo -o wide
          echo ""
          echo "=== PDB Status ==="
          kubectl get pdb --namespace demo
          echo ""
          echo "=== Kured DaemonSet ==="
          kubectl get daemonset kured --namespace kube-system

  availability-test:
    name: Run Availability Test
    runs-on: ubuntu-latest
    needs: setup-test
    outputs:
      total: ${{ steps.probe.outputs.total }}
      success: ${{ steps.probe.outputs.success }}
      failed: ${{ steps.probe.outputs.failed }}
      transient: ${{ steps.probe.outputs.transient }}
      availability: ${{ steps.probe.outputs.availability }}
      result: ${{ steps.probe.outputs.result }}
      service_ip: ${{ needs.setup-test.outputs.service-ip }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Continuous Availability Probe
        id: probe
        env:
          SERVICE_IP: ${{ needs.setup-test.outputs.service-ip }}
          TEST_DURATION: ${{ github.event.inputs.test_duration || '300' }}
        run: |
          echo "Starting availability test against http://$SERVICE_IP for ${TEST_DURATION}s"

          # --- Warmup phase: wait until the service responds at least once ---
          echo "Warming up (waiting for first successful response)..."
          WARMUP_LIMIT=60
          WARMUP_START=$(date +%s)
          while true; do
            WARMUP_ELAPSED=$(( $(date +%s) - WARMUP_START ))
            if [ "$WARMUP_ELAPSED" -ge "$WARMUP_LIMIT" ]; then
              echo "::warning::Warmup timeout after ${WARMUP_LIMIT}s — starting timed test anyway"
              break
            fi
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$SERVICE_IP" 2>/dev/null) || true
            if [ "$CODE" = "200" ]; then
              echo "Service responded (warmup took ${WARMUP_ELAPSED}s)"
              break
            fi
            sleep 2
          done

          # --- Timed availability probe ---
          TOTAL=0
          SUCCESS=0
          FAIL=0
          TRANSIENT=0
          FAIL_LOG=""
          START=$(date +%s)

          while true; do
            NOW=$(date +%s)
            ELAPSED=$((NOW - START))
            if [ "$ELAPSED" -ge "$TEST_DURATION" ]; then
              break
            fi

            TOTAL=$((TOTAL + 1))

            # Capture HTTP code; avoid double-output by separating curl from fallback
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$SERVICE_IP" 2>/dev/null) || true

            if [ "$HTTP_CODE" = "200" ]; then
              SUCCESS=$((SUCCESS + 1))
            elif [ "$HTTP_CODE" = "000" ]; then
              # Connection failure — retry once after a short pause
              sleep 1
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$SERVICE_IP" 2>/dev/null) || true
              if [ "$HTTP_CODE" = "200" ]; then
                SUCCESS=$((SUCCESS + 1))
                TRANSIENT=$((TRANSIENT + 1))
              else
                FAIL=$((FAIL + 1))
                TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                echo "${TS} FAIL: HTTP ${HTTP_CODE} (after retry)"
                FAIL_LOG="${FAIL_LOG}| ${TS} | ${HTTP_CODE} | connection (retried) |\n"
              fi
            else
              FAIL=$((FAIL + 1))
              TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "${TS} FAIL: HTTP ${HTTP_CODE}"
              FAIL_LOG="${FAIL_LOG}| ${TS} | ${HTTP_CODE} | server error |\n"
            fi

            sleep 1
          done

          # --- Results ---
          echo ""
          echo "=== Availability Test Results ==="
          echo "Total requests:     $TOTAL"
          echo "Successful:         $SUCCESS"
          echo "Transient (retried):$TRANSIENT"
          echo "Failed:             $FAIL"

          if [ "$TOTAL" -gt 0 ]; then
            AVAILABILITY=$(echo "scale=4; $SUCCESS * 100 / $TOTAL" | bc)
            echo "Availability:       ${AVAILABILITY}%"
          else
            AVAILABILITY="N/A"
          fi

          # --- Write to GitHub Step Summary ---
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          # --- Export metrics as job outputs ---
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "success=$SUCCESS" >> "$GITHUB_OUTPUT"
          echo "failed=$FAIL" >> "$GITHUB_OUTPUT"
          echo "transient=$TRANSIENT" >> "$GITHUB_OUTPUT"
          echo "availability=$AVAILABILITY" >> "$GITHUB_OUTPUT"
          if [ "$FAIL" -gt 0 ]; then
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          else
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## 🧪 Availability Test Results

          | Metric | Value |
          |---|---|
          | **Service URL** | [http://${SERVICE_IP}](http://${SERVICE_IP}) |
          | **Test duration** | ${TEST_DURATION}s |
          | **Total requests** | ${TOTAL} |
          | **Successful** | ${SUCCESS} |
          | **Transient (retried)** | ${TRANSIENT} |
          | **Failed** | ${FAIL} |
          | **Availability** | ${AVAILABILITY}% |
          | **Run** | [#${GITHUB_RUN_NUMBER}](${RUN_URL}) |
          | **Timestamp** | $(date -u +%Y-%m-%dT%H:%M:%SZ) |
          EOF

          if [ -n "$FAIL_LOG" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF

          <details><summary>Failure details</summary>

          | Time (UTC) | HTTP Code | Category |
          |---|---|---|
          $(echo -e "$FAIL_LOG")

          </details>
          EOF
          fi

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL requests failed out of $TOTAL total. Zero-downtime validation FAILED."
            exit 1
          else
            echo "Zero-downtime validation PASSED: 100% availability."
          fi

  simulate-reboot:
    name: Simulate Node Reboot
    runs-on: ubuntu-latest
    needs: setup-test
    if: github.event.inputs.simulate_reboot != 'false'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Widen Kured Reboot Window
        run: |
          KURED_START="${{ github.event.inputs.kured_start_time || '0am' }}"
          KURED_END="${{ github.event.inputs.kured_end_time || '11:59pm' }}"
          KURED_DAYS="${{ github.event.inputs.kured_reboot_days || 'mo,tu,we,th,fr,sa,su' }}"
          echo "Reconfiguring Kured window: ${KURED_START} - ${KURED_END}, days: ${KURED_DAYS}"
          helm repo add --force-update kured https://kubereboot.github.io/charts
          helm repo update
          helm upgrade kured kured/kured \
            --namespace kube-system \
            --values ./k8s/kured-values.yaml \
            --set "configuration.startTime=${KURED_START}" \
            --set "configuration.endTime=${KURED_END}" \
            --set "configuration.rebootDays={${KURED_DAYS}}" \
            --wait \
            --timeout 5m
          echo "Kured reboot window updated successfully"

      - name: Create Reboot Sentinel on All Nodes
        run: |
          echo "Creating reboot sentinel files to trigger Kured..."
          for NODE in $(kubectl get nodes -o jsonpath='{.items[*].metadata.name}'); do
            echo "  Creating /var/run/reboot-required on ${NODE}..."
            kubectl debug "node/${NODE}" -it --image=busybox:1.36 -- \
              sh -c "chroot /host touch /var/run/reboot-required" 2>/dev/null || true
            echo "  Sentinel created on ${NODE}"
          done

      - name: Wait for Kured to Process
        run: |
          echo "Waiting 60s for Kured to detect sentinel and begin processing..."
          sleep 60

          echo ""
          echo "=== Kured Logs ==="
          kubectl logs -n kube-system -l app.kubernetes.io/name=kured --tail=50 || true

          echo ""
          echo "=== Node Status ==="
          kubectl get nodes -o wide

  post-test-validation:
    name: Post-Test Validation
    runs-on: ubuntu-latest
    needs: [availability-test, simulate-reboot]
    if: always()
    outputs:
      node1_name: ${{ steps.reboot-counts.outputs.node1_name }}
      node1_reboots: ${{ steps.reboot-counts.outputs.node1_reboots }}
      node2_name: ${{ steps.reboot-counts.outputs.node2_name }}
      node2_reboots: ${{ steps.reboot-counts.outputs.node2_reboots }}
      node3_name: ${{ steps.reboot-counts.outputs.node3_name }}
      node3_reboots: ${{ steps.reboot-counts.outputs.node3_reboots }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Final Cluster State
        run: |
          echo "=== Node Status ==="
          kubectl get nodes -o wide
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods --namespace demo -o wide
          echo ""
          echo "=== PDB Status ==="
          kubectl describe pdb zero-downtime-web-pdb --namespace demo
          echo ""
          echo "=== Recent Events ==="
          kubectl get events --namespace demo \
            --sort-by='.lastTimestamp' --field-selector type!=Normal | tail -20 || true
          echo ""
          echo "=== Kured Logs (last 100 lines) ==="
          kubectl logs -n kube-system -l app.kubernetes.io/name=kured --tail=100 || true

      - name: Validate All Pods Running
        run: |
          NOT_RUNNING=$(kubectl get pods --namespace demo \
            --field-selector status.phase!=Running -o name | wc -l)
          if [ "$NOT_RUNNING" -gt 0 ]; then
            echo "::error::$NOT_RUNNING pods are not in Running state"
            kubectl get pods --namespace demo
            exit 1
          fi
          echo "All pods are running."

      - name: Validate All Nodes Ready
        run: |
          NOT_READY=$(kubectl get nodes \
            -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{range .status.conditions[?(@.type=="Ready")]}{.status}{"\n"}{end}{end}' \
            | grep -cv "True" || true)
          if [ "$NOT_READY" -gt 0 ]; then
            echo "::warning::$NOT_READY nodes are not Ready"
            kubectl get nodes
          fi
          echo "All nodes are Ready."

      - name: Collect Node Reboot Counts
        id: reboot-counts
        run: |
          echo "Collecting reboot counts from each node..."
          INDEX=0
          for NODE in $(kubectl get nodes -o jsonpath='{.items[*].metadata.name}' | tr ' ' '\n' | sort); do
            INDEX=$((INDEX + 1))
            # Use kubectl debug to count reboots from wtmp
            REBOOTS=$(kubectl debug "node/${NODE}" -it --image=busybox:1.36 -- \
              sh -c "chroot /host last reboot 2>/dev/null | grep -c reboot" 2>/dev/null || echo "0")
            # Strip any non-numeric characters
            REBOOTS=$(echo "$REBOOTS" | tr -dc '0-9')
            REBOOTS=${REBOOTS:-0}
            echo "  ${NODE}: ${REBOOTS} reboots"
            echo "node${INDEX}_name=${NODE}" >> "$GITHUB_OUTPUT"
            echo "node${INDEX}_reboots=${REBOOTS}" >> "$GITHUB_OUTPUT"
          done
          # Fill remaining slots if fewer than 3 nodes
          for i in $(seq $((INDEX + 1)) 3); do
            echo "node${i}_name=N/A" >> "$GITHUB_OUTPUT"
            echo "node${i}_reboots=0" >> "$GITHUB_OUTPUT"
          done

  record-results:
    name: Record Test Results
    runs-on: ubuntu-latest
    needs: [availability-test, post-test-validation]
    if: always() && needs.availability-test.result != 'skipped'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ github.token }}

      - name: Append to History CSV
        env:
          TOTAL: ${{ needs.availability-test.outputs.total }}
          SUCCESS: ${{ needs.availability-test.outputs.success }}
          FAILED: ${{ needs.availability-test.outputs.failed }}
          TRANSIENT: ${{ needs.availability-test.outputs.transient }}
          AVAILABILITY: ${{ needs.availability-test.outputs.availability }}
          RESULT: ${{ needs.availability-test.outputs.result }}
          SERVICE_IP: ${{ needs.availability-test.outputs.service_ip }}
          TEST_DURATION: ${{ github.event.inputs.test_duration || '300' }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'poc' }}
          SIMULATE_REBOOT: ${{ github.event.inputs.simulate_reboot || 'true' }}
          NODE1_NAME: ${{ needs.post-test-validation.outputs.node1_name }}
          NODE1_REBOOTS: ${{ needs.post-test-validation.outputs.node1_reboots }}
          NODE2_NAME: ${{ needs.post-test-validation.outputs.node2_name }}
          NODE2_REBOOTS: ${{ needs.post-test-validation.outputs.node2_reboots }}
          NODE3_NAME: ${{ needs.post-test-validation.outputs.node3_name }}
          NODE3_REBOOTS: ${{ needs.post-test-validation.outputs.node3_reboots }}
        run: |
          CSV_FILE="test-results/availability-history.csv"
          mkdir -p test-results

          # Create header if file doesn't exist or is missing new columns
          if [ ! -f "$CSV_FILE" ] || ! head -1 "$CSV_FILE" | grep -q "Node1 Reboots"; then
            # Preserve existing data rows if file exists
            if [ -f "$CSV_FILE" ]; then
              tail -n +2 "$CSV_FILE" > "$CSV_FILE.bak" || true
              echo "Timestamp,Run,Environment,Duration(s),Simulate Reboot,Total,Success,Transient,Failed,Availability(%),Result,Service IP,Node1,Node1 Reboots,Node2,Node2 Reboots,Node3,Node3 Reboots,Run URL" > "$CSV_FILE"
              # Append old rows with empty reboot columns
              while IFS= read -r line; do
                echo "${line},,,,,," >> "$CSV_FILE"
              done < "$CSV_FILE.bak"
              rm -f "$CSV_FILE.bak"
            else
              echo "Timestamp,Run,Environment,Duration(s),Simulate Reboot,Total,Success,Transient,Failed,Availability(%),Result,Service IP,Node1,Node1 Reboots,Node2,Node2 Reboots,Node3,Node3 Reboots,Run URL" > "$CSV_FILE"
            fi
          fi

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "${TIMESTAMP},#${GITHUB_RUN_NUMBER},${ENVIRONMENT},${TEST_DURATION},${SIMULATE_REBOOT},${TOTAL},${SUCCESS},${TRANSIENT},${FAILED},${AVAILABILITY},${RESULT},${SERVICE_IP},${NODE1_NAME},${NODE1_REBOOTS},${NODE2_NAME},${NODE2_REBOOTS},${NODE3_NAME},${NODE3_REBOOTS},${RUN_URL}" >> "$CSV_FILE"

          echo "Appended result to ${CSV_FILE}"
          cat "$CSV_FILE"

      - name: Commit History
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-results/availability-history.csv
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: record availability test run #${GITHUB_RUN_NUMBER} [skip ci]"
          git push

      - name: Write History Summary
        run: |
          CSV_FILE="test-results/availability-history.csv"

          cat >> "$GITHUB_STEP_SUMMARY" <<'HEADER'
          ## 📊 Availability Test History

          | # | Timestamp | Env | Duration | Reboot | Total | Success | Transient | Failed | Availability | Node1 | Node2 | Node3 | Result |
          |---|---|---|---|---|---|---|---|---|---|---|---|---|---|
          HEADER

          # Read CSV (skip header), most recent first
          tail -n +2 "$CSV_FILE" | tac | head -20 | while IFS=',' read -r TS RUN ENV DUR SIM TOT SUC TRN FAIL AVAIL RES SIP N1 N1R N2 N2R N3 N3R RURL; do
            if [ "$RES" = "PASS" ]; then
              BADGE="✅"
            else
              BADGE="❌"
            fi
            # Format reboot counts (show name:count or just count)
            N1_DISP="${N1R:-?}"
            N2_DISP="${N2R:-?}"
            N3_DISP="${N3R:-?}"
            echo "          | [${RUN}](${RURL}) | ${TS} | ${ENV} | ${DUR}s | ${SIM} | ${TOT} | ${SUC} | ${TRN} | ${FAIL} | ${AVAIL}% | ${N1_DISP} | ${N2_DISP} | ${N3_DISP} | ${BADGE} ${RES} |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "          > Full history: [test-results/availability-history.csv](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/test-results/availability-history.csv)" >> "$GITHUB_STEP_SUMMARY"
