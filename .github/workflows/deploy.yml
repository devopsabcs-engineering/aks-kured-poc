name: Deploy AKS Kured POC

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment name'
        required: false
        default: 'poc'
        type: string
      location:
        description: 'Azure region'
        required: false
        default: 'canadacentral'
        type: string
      node_count:
        description: 'Number of AKS nodes'
        required: false
        default: '3'
        type: string
      vm_size:
        description: 'VM size for AKS nodes (e.g. Standard_DS2_v2, Standard_D4s_v3)'
        required: false
        default: 'Standard_D4s_v3'
        type: string
      enable_prometheus:
        description: 'Enable Azure Managed Prometheus + Grafana'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      kured_notify_url:
        description: 'Teams/Slack webhook URL for Kured reboot notifications (leave empty to skip)'
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-aks-kured-${{ github.event.inputs.environment || 'poc' }}
  CLUSTER_NAME: aks-kured-${{ github.event.inputs.environment || 'poc' }}
  LOCATION: ${{ github.event.inputs.location || 'canadacentral' }}
  NODE_COUNT: ${{ github.event.inputs.node_count || '3' }}
  VM_SIZE: ${{ github.event.inputs.vm_size || 'Standard_D4s_v3' }}
  ENABLE_PROMETHEUS: ${{ github.event.inputs.enable_prometheus || 'true' }}

jobs:
  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    outputs:
      cluster-name: ${{ steps.deploy-bicep.outputs.clusterName }}
      resource-group: ${{ env.RESOURCE_GROUP }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags project=aks-kured-poc environment=${{ github.event.inputs.environment || 'poc' }}

      - name: Deploy Bicep Template
        id: deploy-bicep
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: >-
            clusterName=${{ env.CLUSTER_NAME }}
            location=${{ env.LOCATION }}
            nodeCount=${{ env.NODE_COUNT }}
            vmSize=${{ env.VM_SIZE }}
            enablePrometheus=${{ env.ENABLE_PROMETHEUS }}
          failOnStdErr: false

      - name: Verify Deployment
        run: |
          az aks show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }} \
            --query "provisioningState" \
            --output tsv

  install-kured:
    name: Install Kured
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Add Kured Helm Repo
        run: |
          helm repo add --force-update kured https://kubereboot.github.io/charts
          helm repo update

      - name: Install Kured
        run: |
          HELM_ARGS="helm upgrade --install kured kured/kured \
            --namespace kube-system \
            --values ./k8s/kured-values.yaml \
            --wait \
            --timeout 5m"

          # Add notify URL if provided (via input or secret)
          NOTIFY_URL="${{ github.event.inputs.kured_notify_url || secrets.KURED_NOTIFY_URL || '' }}"
          if [ -n "$NOTIFY_URL" ]; then
            HELM_ARGS="$HELM_ARGS --set configuration.notifyUrl=$NOTIFY_URL"
          fi

          eval $HELM_ARGS

      - name: Verify Kured DaemonSet
        run: |
          kubectl get daemonset kured --namespace kube-system
          kubectl rollout status daemonset/kured --namespace kube-system --timeout=120s

  deploy-workload:
    name: Deploy Sample Workload
    runs-on: ubuntu-latest
    needs: install-kured
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Deploy Workload Manifests
        run: |
          kubectl apply -f ./k8s/workload/namespace.yaml
          kubectl apply -f ./k8s/workload/deployment.yaml
          kubectl apply -f ./k8s/workload/service.yaml
          kubectl apply -f ./k8s/workload/pdb.yaml

      - name: Wait for Deployment Rollout
        run: |
          kubectl rollout status deployment/zero-downtime-web \
            --namespace demo \
            --timeout=300s

      - name: Verify PDB
        run: |
          kubectl get pdb --namespace demo
          echo "---"
          kubectl describe pdb zero-downtime-web-pdb --namespace demo

      - name: Verify Service Endpoint
        id: service-ip
        run: |
          echo "Waiting for LoadBalancer IP..."
          SERVICE_IP=""
          for i in $(seq 1 30); do
            IP=$(kubectl get svc zero-downtime-web --namespace demo -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ -n "$IP" ]; then
              echo "Service IP: $IP"
              SERVICE_IP="$IP"
              if curl -sf --max-time 10 "http://$IP"; then
                echo "Service is reachable"
                echo "service_ip=$IP" >> "$GITHUB_OUTPUT"
                echo "service_url=http://$IP" >> "$GITHUB_OUTPUT"
                break
              fi
              echo "Service not yet responding, retrying..."
            fi
            sleep 10
          done
          if [ -z "$SERVICE_IP" ]; then
            echo "::warning::Service did not get an external IP within timeout"
          fi

      - name: Write Deployment Summary
        if: always()
        run: |
          SERVICE_IP="${{ steps.service-ip.outputs.service_ip }}"
          SERVICE_URL="${{ steps.service-ip.outputs.service_url }}"
          KURED_PODS=$(kubectl get pods -n kube-system -l app.kubernetes.io/name=kured -o name 2>/dev/null | wc -l)
          WORKLOAD_READY=$(kubectl get deployment zero-downtime-web -n demo -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "N/A")
          WORKLOAD_DESIRED=$(kubectl get deployment zero-downtime-web -n demo -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "N/A")
          NODE_COUNT=$(kubectl get nodes --no-headers 2>/dev/null | wc -l)

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## 🚀 AKS Kured POC — Deployment Summary

          | Property | Value |
          |---|---|
          | **Resource Group** | \`${{ env.RESOURCE_GROUP }}\` |
          | **Cluster** | \`${{ env.CLUSTER_NAME }}\` |
          | **Location** | \`${{ env.LOCATION }}\` |
          | **Nodes** | ${NODE_COUNT} |
          | **Kured Pods** | ${KURED_PODS} |
          | **Workload Replicas** | ${WORKLOAD_READY}/${WORKLOAD_DESIRED} ready |

          ### 🌐 Service Endpoint
          EOF

          if [ -n "$SERVICE_URL" ]; then
            echo "**Public URL:** [${SERVICE_URL}](${SERVICE_URL})" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Service external IP not available yet. Check the cluster manually." >> "$GITHUB_STEP_SUMMARY"
          fi
