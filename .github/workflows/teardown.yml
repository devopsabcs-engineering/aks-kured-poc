name: Teardown AKS Kured POC

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment name to tear down'
        required: false
        default: 'poc'
        type: string
      confirm:
        description: 'Type DELETE to confirm teardown'
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  actions: write

env:
  RESOURCE_GROUP: rg-aks-kured-${{ github.event.inputs.environment || 'poc' }}

jobs:
  validate:
    name: Validate Teardown Request
    runs-on: ubuntu-latest
    steps:
      - name: Check Confirmation
        if: github.event.inputs.confirm != 'DELETE'
        run: |
          echo "::error::Teardown not confirmed. You must type 'DELETE' to proceed."
          exit 1

  teardown:
    name: Delete Resource Group
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check Resource Group Exists
        id: check-rg
        run: |
          EXISTS=$(az group exists --name ${{ env.RESOURCE_GROUP }})
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT
          if [ "$EXISTS" = "false" ]; then
            echo "::warning::Resource group ${{ env.RESOURCE_GROUP }} does not exist. Nothing to delete."
          fi

      - name: Delete Resource Group
        if: steps.check-rg.outputs.exists == 'true'
        run: |
          echo "Deleting resource group ${{ env.RESOURCE_GROUP }}..."
          az group delete \
            --name ${{ env.RESOURCE_GROUP }} \
            --yes \
            --no-wait
          echo "Resource group deletion initiated."

      - name: Wait for Deletion
        if: steps.check-rg.outputs.exists == 'true'
        run: |
          echo "Waiting for resource group deletion to complete..."
          az group wait --deleted --resource-group ${{ env.RESOURCE_GROUP }} --timeout 1800
          echo "Resource group ${{ env.RESOURCE_GROUP }} deleted successfully."

  disable-test-schedule:
    name: Disable Test Workflow Schedule
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Disable Test Workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Disabling scheduled test workflow to prevent failed cron runs..."
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/test.yml/disable"
          echo "Test workflow (test.yml) has been disabled."
          echo ""
          echo "To re-enable, go to Actions > Test AKS Kured POC > ··· > Enable workflow"

      - name: Write Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## 🧹 Teardown Summary

          | Action | Status |
          |---|---|
          | **Resource group** \`${{ env.RESOURCE_GROUP }}\` | Deletion initiated |
          | **Test workflow schedule** (test.yml) | ✅ Disabled |

          > Re-enable the test workflow from **Actions > Test AKS Kured POC > ··· > Enable workflow** after redeploying.
          EOF
