# Kured Helm chart configuration for AKS Kured POC

configuration:
  # Disruption window: weekdays 2-6 AM UTC
  rebootDays:
    - mo
    - tu
    - we
    - th
    - fr
  startTime: "2am"
  endTime: "6am"
  timeZone: "UTC"

  # Check for sentinel every 1 minute (frequent for POC demo)
  period: "1m"

  # Drain configuration
  drainGracePeriod: "60"
  drainTimeout: "300s"

  # Lock safety
  lockTtl: "30m"
  lockReleaseDelay: "1m"

  # Annotate nodes with reboot status
  annotateNodes: true

  # Only one node at a time
  concurrency: 1

  # Logging
  logFormat: "text"

  # --- Notifications ---
  # Teams / Slack webhook URL for reboot notifications.
  # Set via Helm --set or KURED_NOTIFY_URL env var.
  # For Microsoft Teams: create an Incoming Webhook connector in your channel
  # and paste the URL here (or pass it via deploy.yml input).
  # Example: https://outlook.office.com/webhook/...
  # notifyUrl: ""

  # --- Pre/post reboot checks ---
  # Block reboots if any pod matching this selector is not ready.
  # This prevents cascading failures: if the previous reboot broke something
  # and pods can't restart, the next node won't reboot.
  # blockingPodSelector:
  #   - "app=zero-downtime-web"

# Metrics for monitoring
# ServiceMonitor requires Prometheus Operator CRDs; disabled for POC
metrics:
  create: false
  labels: {}
  interval: 60s

service:
  create: true
  port: 8080

# Linux nodes only
nodeSelector:
  kubernetes.io/os: linux

# Resource limits
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 50m
    memory: 64Mi
